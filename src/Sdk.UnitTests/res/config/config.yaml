---
auxData:
  jwt:
    keySets:
      - id: default
        local:
          file: /config/verify_key.jwk

engine:
  defaultPolicyVersion: "default"

schema:
  enforcement: reject

server:
  adminAPI:
    enabled: true
  grpcListenAddr: ":3593"
  httpListenAddr: ":3592"
  logRequestPayloads: true

storage:
  driver: "disk"
  disk:
    directory: /policies
    watchForChanges: true

telemetry:
  disabled: true